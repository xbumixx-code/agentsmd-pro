name = "agentsmd-worker"
main = "worker/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "api.agentsmd.pro/*"
zone_name = "agentsmd.pro"

[vars]
APP_VERSION = "1.0.0"

# Secrets (добавить через: wrangler secret put VARIABLE_NAME)
# LS_WEBHOOK_SECRET  — когда появится Lemon Squeezy
# LS_CHECKOUT_URL    — когда появится Lemon Squeezy

# Для локальной разработки создать .dev.vars:
# LS_WEBHOOK_SECRET=whsec_...
# LS_CHECKOUT_URL=https://agentsmd.lemonsqueezy.com/checkout/...
